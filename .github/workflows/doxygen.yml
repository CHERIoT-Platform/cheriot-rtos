name: Build / deploy doxygen to github pages

on:
  # Build runs on pushes to any branch but deploy job runs only on main
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      # - name: Setup Pages
      #   uses: actions/configure-pages@v5
      # - name: Install doxygen
      #   run: |
      #       sudo apt-get update
      #       sudo apt install graphviz cmake ninja-build
      # Use a recent commit of doxygen from main that seems to work nicely.
      # Released versions lack features or have bugs :-(
      # When the runner supports it we can replace the git commands with
      # git clone --depth 1 --revision
      - name: Build doxygen
        run: |
          sudo apt-get update
          sudo apt install graphviz cmake ninja-build bison flex
          mkdir doxygen
          cd doxygen
          git init
          git remote add origin https://github.com/doxygen/doxygen
          git fetch --depth 1 origin 744dfaeab267a00866a1fe065265f580f3060fac
          git checkout FETCH_HEAD
          mkdir build
          cd build
          cmake -GNinja ..
          ninja
      - name: Run doxygen
        run: mkdir -p tmp/doxyout && doxygen/build/bin/doxygen Doxyfile
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
            path: tmp/doxyout/html/


  # Deployment job
  deploy:
    if: github.ref == 'refs/heads/main'
    # Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
